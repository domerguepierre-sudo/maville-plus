<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MaVille+ V7</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body{margin:0;background:#eef2f5;font-family:Arial,sans-serif}
.top{height:6px;background:linear-gradient(90deg,#0055A4 33%,#fff 33%,#fff 66%,#EF4135 66%)}
header{background:#003189;color:#fff;padding:16px;text-align:center}
main{max-width:760px;margin:auto;padding:18px}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.cat{cursor:pointer;border:2px solid #d7dce5;border-radius:12px;padding:14px;text-align:center;transition:.2s}
.cat.active{background:#003189;color:#fff;border-color:#003189}
#map{height:320px;border-radius:12px;margin-top:10px}
input,textarea,select{width:100%;padding:11px;border:1px solid #ccd2dc;border-radius:8px;box-sizing:border-box;margin:8px 0}
.photoBtns{display:flex;gap:10px}
.photoBtns label{flex:1;background:#003189;color:#fff;padding:12px;border-radius:10px;text-align:center;cursor:pointer}
.photoBtns input{display:none}
#preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
#preview img{width:90px;height:90px;object-fit:cover;border-radius:8px}
button.send{width:100%;padding:15px;background:#003189;color:#fff;border:none;border-radius:10px;font-size:16px}
.small{color:#666;font-size:.9em}
</style>
</head>
<body>
<div class="top"></div>
<header><h1>MaVille+</h1><div>Signalement citoyen</div></header>
<main>

<div class="card">
<h3>📍 Localisation</h3>
<input id="address" placeholder="Adresse (mise à jour automatiquement)">
<div class="small">Autorisez la localisation puis déplacez le marqueur si nécessaire.</div>
<div id="map"></div>
</div>

<div class="card">
<h3>🧩 Catégorie</h3>
<div class="grid">
<div class="cat">🕳️<br>Voirie</div>
<div class="cat">🚦<br>Feux</div>
<div class="cat">💡<br>Éclairage</div>
<div class="cat">🪑<br>Mobilier</div>
<div class="cat">🌳<br>Espaces verts</div>
<div class="cat">🗑️<br>Déchets</div>
<div class="cat">🐕<br>Animaux</div>
<div class="cat">❓<br>Autre</div>
</div>
</div>

<div class="card">
<h3>✍️ Description</h3>
<textarea rows="5" placeholder="Décrivez le problème..."></textarea>

<h3>📷 Photos</h3>
<div class="photoBtns">
<label>📷 Prendre une photo<input id="cam" type="file" accept="image/*" capture="environment"></label>
<label>🖼️ Galerie<input id="gal" type="file" accept="image/*" multiple></label>
</div>
<div id="preview"></div>

<h3>⚠️ Niveau d'urgence</h3>
<select>
<option>Faible</option>
<option>Normal</option>
<option>Important</option>
<option>Danger immédiat</option>
</select>

<h3>👤 Coordonnées</h3>
<input placeholder="Nom">
<input placeholder="Prénom">
<input type="email" placeholder="Adresse e-mail">
<input placeholder="Téléphone (facultatif)">

<button class="send" onclick="alert('Prototype : signalement enregistré')">Envoyer le signalement</button>
</div>

</main>
<script>
document.querySelectorAll('.cat').forEach(c=>c.onclick=()=>{
document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));
c.classList.add('active');
});
const map=L.map('map').setView([-22.2758,166.458],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
let marker=L.marker([-22.2758,166.458],{draggable:true}).addTo(map);
function updateAddress(lat,lng){
document.getElementById('address').value="Lat "+lat.toFixed(6)+" / Lng "+lng.toFixed(6)+" (géocodage inverse à connecter)";
}
function setPos(lat,lng){
marker.setLatLng([lat,lng]); map.setView([lat,lng],16); updateAddress(lat,lng);
}
marker.on('dragend',()=>{let p=marker.getLatLng();updateAddress(p.lat,p.lng);});
map.on('click',e=>setPos(e.latlng.lat,e.latlng.lng));
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
p=>setPos(p.coords.latitude,p.coords.longitude),
()=>alert("Autorisez la géolocalisation pour tester cette fonction.")
);}
function preview(files){
for(const f of files){
const r=new FileReader();
r.onload=e=>{
let i=document.createElement('img');
i.src=e.target.result;
document.getElementById('preview').appendChild(i);
};
r.readAsDataURL(f);
}}
cam.onchange=e=>{preview(e.target.files);}
gal.onchange=e=>{preview(e.target.files);}
</script>
</body></html>
